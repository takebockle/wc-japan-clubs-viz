<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>W杯日本代表 所属クラブマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div id="app">
    <div id="top-title">W杯日本代表 <span>所属クラブマップ</span></div>
    <aside id="sidebar">
      <div id="sheet-handle"><span></span></div>
      <header>
        <h1>W杯日本代表<br><span>所属クラブマップ</span></h1>
      </header>
      <div id="year-control">
        <div id="year-labels"></div>
        <input type="range" id="year-slider" min="0" max="7" step="1" value="7" />
      </div>
      <div id="view-buttons">
        <button class="view-btn" data-view="world">World</button>
        <button class="view-btn" data-view="japan">Japan</button>
        <button class="view-btn" data-view="europe">Europe</button>
      </div>
      <div id="legend">
        <div class="legend-item"><span class="swatch" data-pos="GK"></span>GK</div>
        <div class="legend-item"><span class="swatch" data-pos="DF"></span>DF</div>
        <div class="legend-item"><span class="swatch" data-pos="MF"></span>MF</div>
        <div class="legend-item"><span class="swatch" data-pos="FW"></span>FW</div>
      </div>
      <div id="player-list"></div>
    </aside>
    <div id="map"></div>
    <div id="career-panel"></div>
    <div id="tooltip"></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="app.js?v=15"></script>
</body>
</html>
